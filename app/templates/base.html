<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DirectJobPing</title>
    <style>
      :root { color-scheme: light; --ink:#1d2733; --muted:#5d6875; --line:#d9dee5; --fill:#f7f8fa; --accent:#0f766e; --warn:#b42318; }
      * { box-sizing: border-box; }
      body { margin:0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color:var(--ink); background:white; }
      header { border-bottom:1px solid var(--line); background:#fff; position:sticky; top:0; z-index:2; }
      nav { max-width:1180px; margin:0 auto; height:58px; display:flex; align-items:center; gap:22px; padding:0 18px; }
      nav a { color:var(--muted); text-decoration:none; font-weight:600; font-size:14px; }
      nav a.brand { color:var(--ink); font-size:18px; margin-right:auto; }
      main { max-width:1180px; margin:0 auto; padding:24px 18px 48px; }
      h1 { margin:0 0 18px; font-size:28px; letter-spacing:0; }
      h2 { margin:28px 0 12px; font-size:18px; }
      .stats { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; }
      .stat, .panel, form.inline-card { border:1px solid var(--line); border-radius:8px; padding:14px; background:#fff; }
      .stat strong { display:block; font-size:26px; margin-bottom:3px; }
      .muted { color:var(--muted); font-size:13px; }
      table { width:100%; border-collapse:collapse; font-size:14px; }
      th, td { border-bottom:1px solid var(--line); text-align:left; padding:10px 8px; vertical-align:top; }
      th { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:0; }
      input, select, textarea { width:100%; border:1px solid var(--line); border-radius:6px; padding:8px; font:inherit; }
      textarea { min-height:70px; resize:vertical; }
      label { display:block; font-size:12px; color:var(--muted); font-weight:700; margin-bottom:5px; }
      .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
      .actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
      button, .button { border:1px solid var(--accent); background:var(--accent); color:white; border-radius:6px; padding:8px 11px; font-weight:700; cursor:pointer; text-decoration:none; display:inline-block; }
      button.secondary { background:white; color:var(--accent); }
      button.danger { border-color:var(--warn); background:white; color:var(--warn); }
      .badge { display:inline-block; padding:3px 7px; border-radius:999px; background:var(--fill); color:var(--muted); font-size:12px; font-weight:700; }
      .row-form { display:grid; grid-template-columns:1fr; gap:9px; }
      @media (max-width: 760px) { .stats, .grid { grid-template-columns:1fr; } nav { overflow-x:auto; } table { font-size:13px; } }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <a class="brand" href="/">DirectJobPing</a>
        <a href="/">Dashboard</a>
        <a href="/ui/companies">Companies</a>
        <a href="/ui/jobs">Jobs</a>
        <a href="/ui/settings">Settings</a>
        <a href="/docs">API</a>
      </nav>
    </header>
    <main>{% block content %}{% endblock %}</main>
  </body>
</html>
